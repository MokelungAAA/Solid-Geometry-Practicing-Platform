<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立体几何练习平台</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Material You 样式 -->
  <link rel="stylesheet" href="./css/material-you.css">
  <link rel="stylesheet" href="./css/material-layout.css">
  <link rel="stylesheet" href="./css/material-components.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
    }
  </style>
</head>
<body>
  <!-- 主容器 -->
  <div id="app">
    <!-- 顶部栏 -->
    <header id="header">
      <h1>立体几何练习平台</h1>
    </header>

    <!-- 主内容区 -->
    <main id="main-content">
      <!-- 左侧面板 -->
      <aside id="left-panel">
        <div id="geometry-list"></div>
      </aside>

      <!-- 3D 场景容器 -->
      <div id="scene-container"></div>
    </main>

    <!-- 底部工具栏 -->
    <footer id="toolbar"></footer>
  </div>

  <!-- 信息卡片 -->
  <div id="info-card" class="glass" style="display: none;"></div>

  <!-- Toast 提示容器 -->
  <div id="toast-container"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
