        // ========================
        // 逐步显示下一步证明
        // ========================
        window.toggleProofSteps = function() {
            const content = document.getElementById('proof-steps-content');
            const icon = document.getElementById('proof-steps-toggle-icon');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                icon.textContent = '▼';
            } else {
                content.classList.add('expanded');
                icon.textContent = '▲';
                // 开始逐步显示证明步骤
                showNextProofStep();
            }
        };
        
        function showNextProofStep() {
            if (!currentQuestion || !currentQuestion.proofSteps) return;
            
            const buttonsDiv = document.getElementById('proof-step-buttons');
            if (window.proofState.currentStepIndex < currentQuestion.proofSteps.length - 1) {
                window.proofState.currentStepIndex++;
                const stepEl = document.getElementById(`proof-step-${window.proofState.currentStepIndex}`);
                if (stepEl) {
                    stepEl.classList.add('visible');
                }
                
                // 如果是最后一步，添加评估按钮
                if (window.proofState.currentStepIndex === currentQuestion.proofSteps.length - 1) {
                    if (buttonsDiv) {
                        buttonsDiv.innerHTML = `
                            <button class="btn btn-success btn-sm" onclick="showProofEvaluation()" style="margin-top:15px;">
                                <span class="svg-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span> 完成证明，开始评估
                            </button>
                        `;
                    }
                } else {
                    // 添加"下一步"按钮
                    if (buttonsDiv) {
                        buttonsDiv.innerHTML = `
                            <button class="btn btn-sm" onclick="showNextProofStep()" style="margin-top:10px;">
                                📍 展示下一步
                            </button>
                        `;
                    }
                }
            }
        }
        
        // ========================
        // 显示下一步提示
        // ========================
        window.revealNextHint = function() {
            if (!currentQuestion || !currentQuestion.hints) return;
            
            if (window.proofState.currentHintIndex < currentQuestion.hints.length - 1) {
                window.proofState.currentHintIndex++;
                const hintEl = document.getElementById(`hint-${window.proofState.currentHintIndex}`);
                if (hintEl) {
                    hintEl.classList.add('revealed');
                }
            } else {
                showToast('已显示所有提示');
            }
        };
        
        // ========================
        // 显示证明评估
        // ========================
        window.showProofEvaluation = function() {
            const evalDiv = document.getElementById('proof-evaluation');
            if (evalDiv) {
                evalDiv.style.display = 'block';

            const geometryTypes = ['cube', 'rectangularBox', 'triangularPrism', 'hexagonalPrism', 'squarePyramid', 'tetrahedron', 'triangularPyramid'];
            
            // 获取筛选参数
            const typeFilter = options.type || 'mixed'; // choice, fill, drawing, proof, mixed
            const difficultyFilter = options.difficulty || 'mixed'; // easy, medium, hard, mixed
            const knowledgeFilter = options.knowledge || []; // 知识点标签数组
            
            // 确定题目类型（包含证明题）
            let questionTypes = ['choice', 'fill', 'drawing', 'proof'];
            if (typeFilter !== 'mixed') {
                questionTypes = [typeFilter];
            }
            const qType = questionTypes[Math.floor(Math.random() * questionTypes.length)];
            
            // 确定几何体类型
            const geoType = geometryTypes[Math.floor(Math.random() * geometryTypes.length)];
            
            // 清除顶点选择
            if (window.toggleVertexSelection) {
                const selected = window.getSelectedVertices ? window.getSelectedVertices() : [];
                selected.forEach(v => window.toggleVertexSelection(v));
            }
            
            // 生成动态题目
            const generatedQuestion = generateDynamicQuestion(qType, geoType, {
                difficulty: difficultyFilter,
                knowledge: knowledgeFilter
            });
            
            // 使用题目返回的几何体类型创建几何体
            createGeometry(generatedQuestion.geometry);
            
            renderQuestion(generatedQuestion);
        }
        
        // ========================
        // 生成动态题目（增强版）
        // ========================
        function generateDynamicQuestion(type, geometryType, options = {}) {
            const configs = window.GEOMETRY_CONFIGS;
            const config = configs[geometryType];
            const vertexNames = Object.keys(config.vertices);
            
            // 获取符合条件的模板
            let templates = [];
            if (type === 'mixed' || type === 'random') {
                // 混合类型：从所有模板类型中随机选择
                const allTemplates = [
                    ...(QUESTION_TEMPLATES.choice || []),
                    ...(QUESTION_TEMPLATES.fill || []),
                    ...(QUESTION_TEMPLATES.drawing || []),
                    ...(QUESTION_TEMPLATES.proof || [])
                ];
                templates = allTemplates;
            } else {
                templates = QUESTION_TEMPLATES[type] || [];
            }
            
            // 难度筛选
            if (options.difficulty && options.difficulty !== 'mixed') {
                templates = templates.filter(t => t.difficulty === options.difficulty);
            }
            
            // 知识点筛选
            if (options.knowledge && options.knowledge.length > 0) {
                templates = templates.filter(t => 
                    t.tags && t.tags.some(tag => options.knowledge.includes(tag))
                );
            }
            
            // 证明题特殊处理：根据模板的 geometry 属性选择几何体
            let effectiveGeometryType = geometryType;
            let actualConfig = config;
            if (type === 'proof' || (type === 'mixed' || type === 'random')) {
                // 先筛选出符合几何体要求的证明题模板
                const proofTemplates = templates.filter(t => !t.geometry || t.geometry === geometryType);
                if (proofTemplates.length > 0) {
                    templates = proofTemplates;
                } else if (type === 'proof') {
                    // 如果是证明题但没有匹配的几何体，从证明题中选择
                    templates = QUESTION_TEMPLATES.proof || [];
                }
            }
            
            // 如果没有符合条件的模板，使用所有模板
            if (templates.length === 0) {
                if (type === 'mixed' || type === 'random') {
                    templates = [
                        ...(QUESTION_TEMPLATES.choice || []),
                        ...(QUESTION_TEMPLATES.fill || []),
                        ...(QUESTION_TEMPLATES.drawing || [])
                    ];
                } else {
                    templates = QUESTION_TEMPLATES[type] || [];
                }
            }
            
            // 随机选择模板
            const template = templates[Math.floor(Math.random() * templates.length)];
            
            // 确定实际几何体类型和配置
            if (template.geometry) {
                effectiveGeometryType = template.geometry;
                actualConfig = configs[effectiveGeometryType];
            }
            
            // 生成题目
            const result = template.generate(actualConfig, effectiveGeometryType);
            
            // 确定实际题目类型
            let actualType = type;
            if (type === 'mixed' || type === 'random') {
                if (template.id.startsWith('choice')) {
                    actualType = 'choice';
                } else if (template.id.startsWith('fill')) {
                    actualType = 'fill';
                } else if (template.id.startsWith('drawing')) {
                    actualType = 'drawing';
                } else if (template.id.startsWith('proof')) {
                    actualType = 'proof';
                } else {
                    actualType = 'drawing';
                }
            }
            
            // 构建题目对象
            const question = {
                id: Date.now(),
                type: actualType,
                difficulty: template.difficulty,
                geometry: effectiveGeometryType,
                tags: template.tags || [],
                ...result
            };
            
            // 对于选择题，确保correct字段与correctIndex一致
            if (actualType === 'choice' && result.options && result.correctIndex !== undefined) {
                question.correct = result.correctIndex;
            }
            
            return question;
        }

                </div>
                <button class="btn btn-next-question" onclick="nextPracticeQuestion()" style="margin-top:15px;">
                    <span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7"/></svg></span> 下一题
                </button>
            `;
            feedback.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // ========================
        // 记录练习结果
        // ========================
        function recordPracticeResult(isCorrect) {
            practiceMode.sessionTotal++;
            if (isCorrect) {
                practiceMode.sessionCorrect++;
            }
            updatePracticeProgress();
        }
        
        // ========================
        // 下一道练习题
        // ========================
        function nextPracticeQuestion() {
            generateNextPracticeQuestion();
        }
        
        // ========================
        // 显示练习总结
        // ========================
        function showPracticeSummary() {
            const accuracy = practiceMode.sessionTotal > 0 ? 
                Math.round((practiceMode.sessionCorrect / practiceMode.sessionTotal) * 100) : 0;
            
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div style="text-align:center;padding:30px 20px;background:linear-gradient(135deg, rgba(137,207,240,0.15), rgba(138,230,160,0.15));border-radius:16px;border:2px solid var(--chalk-blue);">
                    <div style="margin-bottom:15px;">
                        <span class="svg-icon" style="width:48px;height:48px;opacity:0.8;">
                            <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        </span>
                    </div>
                    <div style="font-family:'Ma Shan Zheng',cursive;font-size:24px;color:var(--chalk-blue);margin-bottom:20px;">练习完成！</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:25px;">
                        <div style="padding:15px;background:rgba(0,0,0,0.2);border-radius:12px;">
                            <div style="font-size:28px;font-family:'Ma Shan Zheng',cursive;color:var(--chalk-purple);">${practiceMode.sessionTotal}</div>
                            <div style="font-size:11px;color:var(--text-dim);">完成题数</div>
                        </div>
                        <div style="padding:15px;background:rgba(0,0,0,0.2);border-radius:12px;">
                            <div style="font-size:28px;font-family:'Ma Shan Zheng',cursive;color:var(--chalk-green);">${practiceMode.sessionCorrect}</div>
                            <div style="font-size:11px;color:var(--text-dim);">正确题数</div>
                        </div>
                        <div style="padding:15px;background:rgba(0,0,0,0.2);border-radius:12px;">
                            <div style="font-size:28px;font-family:'Ma Shan Zheng',cursive;color:var(--chalk-yellow);">${accuracy}%</div>
                            <div style="font-size:11px;color:var(--text-dim);">正确率</div>
                        </div>
                    </div>
                    <div style="font-size:14px;color:var(--text-dim);margin-bottom:20px;">
                        ${accuracy >= 80 ? '太棒了！继续保持！' : accuracy >= 60 ? '不错的表现，继续加油！' : '多多练习，你会越来越好！'}
                    </div>
                    <div style="display:flex;gap:10px;justify-content:center;">
                        <button class="btn btn-primary" onclick="restartPracticeMode()"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></span> 再练一次</button>
                        <button class="btn" onclick="endPracticeMode()"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span> 返回题库</button>
                    </div>
                </div>
            `;
            
            practiceMode.active = false;
        }
        
        // ========================
        // 重新开始练习
        // ========================
        function restartPracticeMode() {
            startPracticeMode({
                total: practiceMode.totalQuestions,
                type: practiceMode.type,
                difficulty: practiceMode.difficulty,
                knowledge: practiceMode.knowledge
            });
        }
        
        // ========================
        // 结束练习模式
        // ========================
        function endPracticeMode() {
            practiceMode.active = false;
            practiceMode.sessionTotal = 0;
            practiceMode.sessionCorrect = 0;
            practiceMode.currentIndex = 0;
            
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <span class="svg-icon" style="width:48px;height:48px;opacity:0.5;">
                            <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        </span>
                    </div>
                    <p>点击上方按钮开始练习</p>
                </div>
            `;
        }
        
        // ========================
        // 获取几何体名称（兼容旧代码）
        // ========================
        function getGeometryName(type) {
            const names = {
                'cube': '正方体',
                'rectangularBox': '长方体',
                'triangularPrism': '三棱柱',
                'hexagonalPrism': '正六棱柱',
                'squarePyramid': '四棱锥',
                'tetrahedron': '正四面体',
                'triangularPyramid': '斜三棱锥'
            };
            return names[type] || '几何体';
        }
        
        // ========================
        // 初始化题目选择器
        // ========================
        function initQuestionSelector() {
            const select = document.getElementById('question-select');
            questionBank.forEach(q => {
                const typeText = q.type === 'choice' ? '[选择]' : 
                                 q.type === 'fill' ? '[填空]' : '[作图]';
                const option = document.createElement('option');
                option.value = q.id;
                option.textContent = `${typeText} 第${q.id}题 - ${q.question.substring(0, 25)}...`;
                select.appendChild(option);
            });
            
            select.addEventListener('change', (e) => {
                if (e.target.value) {
                    // 清除顶点选择
                    if (window.toggleVertexSelection) {
                        const selected = window.getSelectedVertices ? window.getSelectedVertices() : [];
                        selected.forEach(v => window.toggleVertexSelection(v));
                    }
                    
                    const question = questionBank.find(q => q.id === parseInt(e.target.value));
                    if (question) renderQuestion(question);
                    e.target.value = '';
                }
            });
        }
        
        // ========================
        // 初始化出题控制面板
        // ========================
        function initQuestionControlPanel() {
            const panel = document.getElementById('question-control-panel');
            if (!panel) return;
            
            // 找到或创建 control-panel-body
            let bodyContainer = panel.querySelector('.control-panel-body');
            if (!bodyContainer) {
                bodyContainer = document.createElement('div');
                bodyContainer.className = 'control-panel-body';
                panel.appendChild(bodyContainer);
            }
            
            // 生成知识点标签
            let tagsHtml = '<div class="knowledge-tags" style="margin-top:8px;">';
            Object.keys(KNOWLEDGE_POINTS).forEach(key => {
                const kp = KNOWLEDGE_POINTS[key];
                tagsHtml += `<label class="knowledge-tag" style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(0,0,0,0.2);border-radius:12px;font-size:11px;cursor:pointer;transition:all 0.2s;margin:2px;">
                    <input type="checkbox" value="${key}" style="display:none;" onchange="updateKnowledgeFilter(this)">
                    <span style="width:8px;height:8px;border-radius:50%;background:${kp.color};"></span>
                    ${kp.name}
                </label>`;
            });
            tagsHtml += '</div>';
            
            bodyContainer.innerHTML = `
                <div class="control-section" style="margin-bottom:12px;">
                    <div class="control-label" style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">题型</div>
                    <div class="type-buttons" style="display:flex;gap:4px;flex-wrap:wrap;">
                        <button class="btn btn-sm active" data-type="mixed" onclick="setQuestionType('mixed')" style="flex:1;min-width:45px;">混合</button>
                        <button class="btn btn-sm" data-type="choice" onclick="setQuestionType('choice')" style="flex:1;min-width:45px;">选择</button>
                        <button class="btn btn-sm" data-type="fill" onclick="setQuestionType('fill')" style="flex:1;min-width:45px;">填空</button>
                        <button class="btn btn-sm" data-type="drawing" onclick="setQuestionType('drawing')" style="flex:1;min-width:45px;">作图</button>
                        <button class="btn btn-sm" data-type="proof" onclick="setQuestionType('proof')" style="flex:1;min-width:45px;background:var(--chalk-purple);color:#1a1a2e;">证明</button>
                    </div>
                </div>
                <div class="control-section" style="margin-bottom:12px;">
                    <div class="control-label" style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">难度</div>
                    <div class="difficulty-buttons" style="display:flex;gap:4px;">
                        <button class="btn btn-sm active" data-difficulty="mixed" onclick="setDifficulty('mixed')" style="flex:1;">混合</button>
                        <button class="btn btn-sm" data-difficulty="easy" onclick="setDifficulty('easy')" style="flex:1;color:var(--chalk-green);">简单</button>
                        <button class="btn btn-sm" data-difficulty="medium" onclick="setDifficulty('medium')" style="flex:1;color:var(--chalk-yellow);">中等</button>
                        <button class="btn btn-sm" data-difficulty="hard" onclick="setDifficulty('hard')" style="flex:1;color:var(--chalk-red);">困难</button>
                    </div>
                </div>
                <div class="control-section" style="margin-bottom:12px;">
                    <div class="control-label" style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">知识点（可多选）</div>
                    ${tagsHtml}
                </div>
                <div class="control-section" style="margin-bottom:12px;">
                    <div class="control-label" style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">练习题数</div>
                    <div class="count-buttons" style="display:flex;gap:4px;">
                        <button class="btn btn-sm" data-count="5" onclick="setPracticeCount(5)">5题</button>
                        <button class="btn btn-sm active" data-count="10" onclick="setPracticeCount(10)">10题</button>
                        <button class="btn btn-sm" data-count="20" onclick="setPracticeCount(20)">20题</button>
                        <button class="btn btn-sm" data-count="999" onclick="setPracticeCount(999)">∞</button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="startPracticeFromPanel()" style="width:100%;">
                    <span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span> 开始练习
                </button>
            `;
            
            // 添加标签点击效果
            setTimeout(() => {
                document.querySelectorAll('.knowledge-tag').forEach(tag => {
                    tag.addEventListener('click', () => {
                        const checkbox = tag.querySelector('input');
                        checkbox.checked = !checkbox.checked;
                        tag.style.background = checkbox.checked ? 'rgba(137,207,240,0.3)' : 'rgba(0,0,0,0.2)';
                    });
                });
            }, 100);
        }
        
        // ========================
        // 出题控制变量
        // ========================
        let questionControl = {
            type: 'mixed',
            difficulty: 'mixed',
            knowledge: [],
            practiceCount: 10
        };
        
        // ========================
        // 设置题目类型
        // ========================
        function setQuestionType(type) {
            questionControl.type = type;
            document.querySelectorAll('.type-buttons .btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
        }
        
        // ========================
        // 设置难度
        // ========================
        function setDifficulty(difficulty) {
            questionControl.difficulty = difficulty;
            document.querySelectorAll('.difficulty-buttons .btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.difficulty === difficulty);
            });
        }
        
        // ========================
        // 设置练习题数
        // ========================
        function setPracticeCount(count) {
            questionControl.practiceCount = count;
            document.querySelectorAll('.count-buttons .btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.count) === count);
            });
        }
        
        // ========================
        // 更新知识点筛选
        // ========================
        function updateKnowledgeFilter(checkbox) {
            const value = checkbox.value;
            if (checkbox.checked) {
                if (!questionControl.knowledge.includes(value)) {
                    questionControl.knowledge.push(value);
                }
            } else {
                questionControl.knowledge = questionControl.knowledge.filter(k => k !== value);
            }
        }
        
        // ========================
        // 从控制面板开始练习
        // ========================
        function startPracticeFromPanel() {
            startPracticeMode({
                total: questionControl.practiceCount,
                type: questionControl.type,
                difficulty: questionControl.difficulty,
                knowledge: questionControl.knowledge
            });
        }
        
        // ========================
        // 初始化
        // ========================
        document.getElementById('btn-random-question').addEventListener('click', randomQuestion);
        document.getElementById('btn-auto-generate').addEventListener('click', () => autoGenerateQuestion({
            type: 'mixed',
            difficulty: 'mixed'
        }));
        initQuestionSelector();
        initQuestionControlPanel();
        updateStats();
    </script>
</body>
</html>
