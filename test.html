<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立体几何平台 - 测试页面</title>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1976d2;
            margin-bottom: 20px;
        }
        .test-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #fafafa;
            border-radius: 8px;
        }
        .test-section h2 {
            margin-top: 0;
            color: #333;
        }
        .test-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #1976d2;
        }
        .btn {
            padding: 8px 16px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #1565c0;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>立体几何平台 - 功能测试</h1>

        <div class="test-section">
            <h2>1. 页面加载测试</h2>
            <div class="test-item">
                <p>检查主页面是否能正常加载：</p>
                <button class="btn" onclick="testMainPage()">测试主页面</button>
                <div id="result1" class="result"></div>
            </div>
        </div>

        <div class="test-section">
            <h2>2. 几何体配置测试</h2>
            <div class="test-item">
                <p>检查几何体配置是否正确加载：</p>
                <button class="btn" onclick="testGeometryConfigs()">测试几何体配置</button>
                <div id="result2" class="result"></div>
            </div>
        </div>

        <div class="test-section">
            <h2>3. 练习模式测试</h2>
            <div class="test-item">
                <p>测试题目生成功能：</p>
                <button class="btn" onclick="testPracticeMode()">测试题目生成</button>
                <div id="result3" class="result"></div>
            </div>
        </div>

        <div class="test-section">
            <h2>4. 做题记录测试</h2>
            <div class="test-item">
                <p>测试记录存储功能：</p>
                <button class="btn" onclick="testRecords()">测试记录功能</button>
                <div id="result4" class="result"></div>
            </div>
        </div>

        <div class="test-section">
            <h2>5. 样式测试</h2>
            <div class="test-item">
                <p>检查Material You样式是否正确应用：</p>
                <button class="btn" onclick="testStyles()">测试样式</button>
                <div id="result5" class="result"></div>
            </div>
        </div>
    </div>

    <script>
        function testMainPage() {
            const result = document.getElementById('result1');
            result.style.display = 'block';
            result.innerHTML = '正在测试主页面加载...';

            fetch('http://localhost:3002/')
                .then(response => {
                    if (response.ok) {
                        result.innerHTML = '✅ 主页面加载成功！';
                        result.style.background = '#e8f5e9';
                    } else {
                        result.innerHTML = '❌ 主页面加载失败：' + response.status;
                        result.style.background = '#ffebee';
                    }
                })
                .catch(error => {
                    result.innerHTML = '❌ 连接失败：' + error.message;
                    result.style.background = '#ffebee';
                });
        }

        function testGeometryConfigs() {
            const result = document.getElementById('result2');
            result.style.display = 'block';

            // 模拟几何体配置
            const configs = {
                cube: { name: '正方体', vertices: 8, edges: 12, faces: 6 },
                cuboid: { name: '长方体', vertices: 8, edges: 12, faces: 6 },
                cylinder: { name: '圆柱', vertices: 0, edges: 2, faces: 3 },
                cone: { name: '圆锥', vertices: 1, edges: 1, faces: 2 },
                sphere: { name: '球', vertices: 0, edges: 0, faces: 1 }
            };

            let html = '<strong>几何体配置：</strong><br>';
            for (const [type, config] of Object.entries(configs)) {
                html += `${config.name}: 顶点${config.vertices}, 棱${config.edges}, 面${config.faces}<br>`;
            }

            result.innerHTML = html;
            result.style.background = '#e8f5e9';
        }

        function testPracticeMode() {
            const result = document.getElementById('result3');
            result.style.display = 'block';

            // 模拟题目生成
            const questions = [
                { type: 'fill', difficulty: 'easy', question: '已知正方体边长为2，求其体积。' },
                { type: 'choice', difficulty: 'medium', question: '关于正方体，以下说法正确的是：' },
                { type: 'proof', difficulty: 'hard', question: '证明正方体中的线面垂直关系。' }
            ];

            let html = '<strong>生成的题目：</strong><br>';
            questions.forEach((q, i) => {
                html += `${i+1}. [${q.type}] ${q.question}<br>`;
            });

            result.innerHTML = html;
            result.style.background = '#e8f5e9';
        }

        function testRecords() {
            const result = document.getElementById('result4');
            result.style.display = 'block';

            // 模拟记录操作
            const record = {
                date: new Date().toISOString(),
                questions: 5,
                correct: 4,
                accuracy: 80
            };

            // 测试localStorage
            try {
                localStorage.setItem('test-record', JSON.stringify(record));
                const stored = JSON.parse(localStorage.getItem('test-record'));

                if (stored && stored.accuracy === 80) {
                    result.innerHTML = '✅ 记录存储功能正常！<br>存储的记录：' + JSON.stringify(stored);
                    result.style.background = '#e8f5e9';
                } else {
                    result.innerHTML = '❌ 记录存储异常';
                    result.style.background = '#ffebee';
                }
            } catch (error) {
                result.innerHTML = '❌ localStorage不可用：' + error.message;
                result.style.background = '#ffebee';
            }
        }

        function testStyles() {
            const result = document.getElementById('result5');
            result.style.display = 'block';

            // 检查CSS变量
            const style = getComputedStyle(document.documentElement);
            const primary = style.getPropertyValue('--md-primary');
            const surface = style.getPropertyValue('--md-surface');

            let html = '<strong>CSS变量检查：</strong><br>';
            html += `--md-primary: ${primary || '未定义'}<br>`;
            html += `--md-surface: ${surface || '未定义'}<br><br>`;

            if (primary && surface) {
                html += '✅ Material You样式变量已定义';
                result.style.background = '#e8f5e9';
            } else {
                html += '⚠️ 部分样式变量未定义，可能影响显示效果';
                result.style.background = '#fff3e0';
            }

            result.innerHTML = html;
        }

        // 页面加载时自动运行基础测试
        window.onload = function() {
            console.log('测试页面加载完成');
        };
    </script>
</body>
</html>
